<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details - Projexify</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .project-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem);
      position: relative;
      z-index: 1;
    }

    .project-header {
      padding: clamp(4rem, 8vw, 8rem) 2rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-2xl);
      margin-bottom: clamp(3rem, 6vw, 5rem);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .project-title {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 900;
      margin-bottom: 1rem;
      letter-spacing: -0.03em;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .project-subtitle {
      font-size: clamp(1.1rem, 2vw, 1.3rem);
      color: var(--text-muted);
      max-width: 800px;
      margin: 0 auto;
    }

    .project-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: clamp(2rem, 5vw, 4rem);
    }

    .section-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-content {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-dim);
    }

    .tag {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 12px;
      font-size: 0.85rem;
      color: var(--primary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: var(--transition);
    }

    .tag:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .info-card {
      padding: 2rem;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      transition: var(--transition);
    }

    .info-card:hover {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .info-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .info-value {
      font-size: 2rem;
      font-weight: 900;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mentor-info {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.5rem;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mentor-avatar {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
    }

    .mentor-name {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 0.25rem;
    }

    .mentor-title {
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    .content-section {
      padding: 2.5rem;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
    }

    /* Aurora Background Styles */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #0B0C15;
      overflow: hidden;
    }

    .aurora-blob {
      position: absolute;
      width: 800px;
      height: 800px;
      filter: blur(100px);
      opacity: 0.4;
      border-radius: 50%;
      mix-blend-mode: screen;
      animation: move 25s infinite alternate;
    }

    .aurora-1 {
      background: radial-gradient(circle, #6366f1 0%, transparent 70%);
      top: -200px;
      left: -200px;
    }

    .aurora-2 {
      background: radial-gradient(circle, #10b981 0%, transparent 70%);
      bottom: -200px;
      right: -200px;
      animation-delay: -5s;
    }

    .aurora-3 {
      background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: move-center 30s infinite alternate;
    }

    @keyframes move {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { transform: translate(100px, 100px) rotate(90deg) scale(1.2); }
    }

    @keyframes move-center {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-40%, -60%) scale(1.3); }
    }

    @media (max-width: 1024px) {
      .project-grid {
        grid-template-columns: 1fr;
      }
      .sidebar {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <!-- Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-blob aurora-1"></div>
    <div class="aurora-blob aurora-2"></div>
    <div class="aurora-blob aurora-3"></div>
  </div>

  <div id="projectDetails">
    <div class="loading-spinner"></div>
  </div>

  <script src="/assets/js/api-client.js"></script>
  <script src="/assets/js/ui-manager.js"></script>
  <script src="/assets/js/payment-modal.js"></script>
  <script>
    // Initialize payment modal globally
    const paymentModal = new PaymentModal();
    window.paymentModal = paymentModal;

    // Check if user is already enrolled in this project
    const checkEnrollmentStatus = async (projectId) => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user || !user.roles || !user.roles.includes('student')) {
        return; // Not a student, no need to check
      }

      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/enrollment/status/${projectId}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.ok) {
          const data = await response.json();
          
          if (data.enrolled) {
            console.log('✅ User is already enrolled in this project');
            const enrollBtn = document.getElementById('enrollBtn');
            const enrollOptions = document.getElementById('enrollOptions');
            
            if (enrollBtn) {
              enrollBtn.textContent = '✅ Already Enrolled - Go to Dashboard';
              enrollBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
              enrollBtn.onclick = () => {
                window.location.href = '/pages/student/dashboard.html';
              };
            }
            
            // Disable track selection
            const soloTrack = document.getElementById('soloTrack');
            const squadTrack = document.getElementById('squadTrack');
            if (soloTrack) soloTrack.style.pointerEvents = 'none';
            if (squadTrack) squadTrack.style.pointerEvents = 'none';
            
            // Update assets tab
            const assetsTab = document.getElementById('assetsTab');
            if (assetsTab) {
              assetsTab.innerHTML = 'Project Assets ✅';
              assetsTab.style.color = '#10b981';
            }
            
            // Unlock assets content - show only if project has actual assets
            const assetsContent = document.getElementById('assetsContent');
            if (assetsContent) {
              const projectData = await window.api.getProject(projectId);
              const hasAssets = projectData.assets && projectData.assets.length > 0;
              
              if (hasAssets) {
                // Group assets by type for better organization
                const assetsByType = {};
                projectData.assets.forEach(asset => {
                  const type = asset.type || 'file';
                  if (!assetsByType[type]) assetsByType[type] = [];
                  assetsByType[type].push(asset);
                });
                
                const typeIcons = {
                  'pdf': '📋',
                  'code': '💻',
                  'design': '🎨',
                  'image': '🖼️',
                  'document': '📄',
                  'file': '📁'
                };
                
                assetsContent.innerHTML = `
                  <h2 class="gradient-text" style="margin-bottom: 2rem; font-size: 2rem;">📦 Project Resources</h2>
                  
                  <div style="display: grid; gap: 1.5rem;">
                    ${projectData.assets.map((asset, idx) => `
                      <div style="padding: 1.5rem; background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 16px;">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                          <div style="width: 48px; height: 48px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                            ${typeIcons[asset.type] || '📄'}
                          </div>
                          <div style="flex: 1; min-width: 0;">
                            <h3 style="font-weight: 700; margin: 0; word-break: break-word;">${asset.title || asset.originalName || 'Resource'}</h3>
                            <p style="font-size: 0.875rem; color: var(--text-dim); margin: 0.25rem 0 0 0;">
                              ${asset.type || 'file'} • ${asset.size ? (asset.size / 1024).toFixed(2) + ' KB' : 'Unknown size'}
                            </p>
                          </div>
                        </div>
                      </div>
                    `).join('')}
                  </div>
                  
                  <div style="margin-top: 2rem; text-align: center;">
                    <button id="downloadAllAssets" class="btn btn-primary" style="padding: 1rem 2rem; font-size: 1.125rem;">
                      📦 Download All Assets as ZIP
                    </button>
                  </div>
                  
                  <div style="margin-top: 2rem; padding: 1.5rem; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 16px;">
                    <p style="margin: 0; color: #10b981; font-weight: 600;">
                      ✅ Start building in your 
                      <a href="/pages/student/project-workspace.html?id=${data.enrolled.projectId}" style="color: #10b981; text-decoration: underline;">Project Workspace</a>
                    </p>
                  </div>
                `;
                
                // Add event listener for download all button
                document.getElementById('downloadAllAssets').addEventListener('click', async () => {
                  const btn = document.getElementById('downloadAllAssets');
                  const originalText = btn.innerHTML;
                  btn.disabled = true;
                  btn.innerHTML = '⏳ Preparing download...';
                  
                  try {
                    const token = localStorage.getItem('token');
                    const response = await fetch(`/api/projects/${projectId}/assets/download`, {
                      headers: {
                        'Authorization': `Bearer ${token}`
                      }
                    });
                    
                    if (!response.ok) throw new Error('Failed to download assets');
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${projectData.title.replace(/[^a-z0-9]/gi, '_')}_assets.zip`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    
                    btn.innerHTML = '✅ Downloaded!';
                    setTimeout(() => {
                      btn.disabled = false;
                      btn.innerHTML = originalText;
                    }, 2000);
                  } catch (error) {
                    console.error('Download error:', error);
                    alert('Failed to download assets: ' + error.message);
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                  }
                });
              } else {
                assetsContent.innerHTML = `
                  <h2 class="gradient-text" style="margin-bottom: 2rem; font-size: 2rem;">📦 Project Resources</h2>
                  
                  <div style="text-align: center; padding: 3rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">📂</div>
                    <h3 style="margin-bottom: 1rem;">No assets available yet</h3>
                    <p style="color: var(--text-dim); margin-bottom: 2rem;">Your mentor will share project resources during your sessions.</p>
                    <a href="/pages/student/project-workspace.html?id=${data.enrolled.projectId}" class="btn btn-primary">
                      Go to Project Workspace
                    </a>
                  </div>
                `;
              }
            }
          }
        }
      } catch (error) {
        console.error('Error checking enrollment status:', error);
      }
    };

    const handleEnroll = async (projectId, projectPrice, projectTitle) => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        if (window.uiManager) window.uiManager.showToast('Please login to enroll in this project', 'warning');
        setTimeout(() => window.location.href = '/login.html', 1500);
        return;
      }

      const isStudent = user.roles && user.roles.includes('student');
      if (!isStudent) {
        if (window.uiManager) window.uiManager.showToast('Only students can enroll in projects', 'error');
        return;
      }

      try {
        const enrollBtn = document.getElementById('enrollBtn');
        const squadTrack = document.getElementById('squadTrack');
        const groupNameInput = document.getElementById('groupName');
        const isSquad = squadTrack && squadTrack.classList.contains('active');
        const groupName = groupNameInput ? groupNameInput.value : '';
        const selectedGroupId = groupNameInput ? groupNameInput.dataset.selectedGroupId : null;

        if (isSquad && !groupName) {
          if (window.uiManager) window.uiManager.showToast('Please enter a Squad Name or select an existing squad', 'warning');
          return;
        }

        // Check if project is free or paid
        if (projectPrice > 0) {
          // Show payment modal for paid projects
          console.log('💳 Opening payment modal for paid project...');
          
          if (window.paymentModal) {
            window.paymentModal.open({
              projectId,
              projectTitle,
              amount: projectPrice * 100, // Convert to paise
              enrollmentType: isSquad ? 'group' : 'solo',
              groupName,
              selectedGroupId
            });
          } else {
            console.error('Payment modal not initialized');
            if (window.uiManager) window.uiManager.showToast('Payment system error. Please refresh the page.', 'error');
          }
          return;
        }

        // If selected an existing squad, use join endpoint instead
        if (isSquad && selectedGroupId) {
          console.log('🎯 Joining existing squad:', selectedGroupId);
          
          if (enrollBtn) {
            enrollBtn.disabled = true;
            enrollBtn.textContent = 'Joining Squad...';
          }

          if (window.uiManager) window.uiManager.showLoading('Joining squad...');

          const response = await fetch(`/api/groups/${selectedGroupId}/join`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${localStorage.getItem('token')}`
            }
          });

          const data = await response.json();
          if (window.uiManager) window.uiManager.hideLoading();

          if (response.ok) {
            if (window.uiManager) window.uiManager.showToast('✅ Successfully joined squad!', 'success', 6000);
            
            if (enrollBtn) {
              enrollBtn.disabled = false;
              enrollBtn.textContent = '👥 Joined Squad - Go to Dashboard';
              enrollBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
              
              const newEnrollBtn = enrollBtn.cloneNode(true);
              enrollBtn.parentNode.replaceChild(newEnrollBtn, enrollBtn);
              newEnrollBtn.addEventListener('click', () => {
                  window.location.href = '/pages/student/dashboard.html';
              });
            }
            return;
          } else {
            throw new Error(data.message || 'Failed to join squad');
          }
        }

        // Handle normal enrollment (creating new squad or solo)
        if (enrollBtn) {
          enrollBtn.disabled = true;
          enrollBtn.textContent = 'Processing...';
        }

        if (window.uiManager) window.uiManager.showLoading('Securing your spot...');

        const response = await fetch('/api/enrollment/free', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${localStorage.getItem('token')}`
          },
          body: JSON.stringify({ 
            projectId, 
            enrollmentType: isSquad ? 'group' : 'solo',
            groupName
          })
        });

        const data = await response.json();
        if (window.uiManager) window.uiManager.hideLoading();

        if (response.ok && data.enrolled) {
          if (window.uiManager) window.uiManager.showToast(`✅ Enrolled Successfully! ${isSquad ? 'Squad created.' : ''}`, 'success', 6000);
          
          if (enrollBtn) {
            enrollBtn.disabled = false;
            enrollBtn.textContent = isSquad ? '👥 Manage Squad' : '🚀 Open Dashboard';
            enrollBtn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            
            const newEnrollBtn = enrollBtn.cloneNode(true);
            enrollBtn.parentNode.replaceChild(newEnrollBtn, enrollBtn);
            newEnrollBtn.addEventListener('click', () => {
                window.location.href = '/pages/student/dashboard.html';
            });
          }

          const assetsTab = document.getElementById('assetsTab');
          if (assetsTab) {
            assetsTab.innerHTML = 'Project Assets ✅';
            assetsTab.style.color = '#10b981';
          }
        } else {
          throw new Error(data.message || 'Enrollment failed');
        }
      } catch (error) {
        console.error('Enrollment error:', error);
        if (window.uiManager) window.uiManager.hideLoading();
        if (window.uiManager) window.uiManager.showToast('❌ Error: ' + error.message, 'error', 5000);
        const enrollBtn = document.getElementById('enrollBtn');
        if (enrollBtn) {
          enrollBtn.disabled = false;
          enrollBtn.textContent = '🚀 Enroll Now';
        }
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      // Disable notifications on this page to reduce API calls
      window.uiManager = new UIManager({ enableNotifications: false });
      
      const container = document.getElementById('projectDetails');
      
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('id');

      if (!projectId) {
        container.innerHTML = '<div class="container" style="padding: 100px; text-align: center;"><h2>Project not found</h2><a href="/marketplace.html" class="btn btn-primary">Back to Marketplace</a></div>';
        return;
      }

      try {
        const project = await window.api.getProject(projectId);
        
        container.innerHTML = `
          <header class="project-header" style="padding: 8rem 2rem 5rem; background: radial-gradient(circle at center, rgba(99, 102, 241, 0.05) 0%, transparent 70%);">
            <div class="container">
              <div class="badge-pill" style="margin: 0 auto 1.5rem;">${project.difficulty_level}</div>
              <h1 class="gradient-text" style="font-size: 4.5rem; margin-bottom: 1.5rem; letter-spacing: -0.03em;">${project.title}</h1>
              <p style="color: var(--text-muted); font-size: 1.25rem; max-width: 800px; margin: 0 auto; line-height: 1.6;">
                ${project.abstract || (project.description ? project.description.substring(0, 200) + "..." : "")}
              </p>
            </div>
          </header>

          <div class="project-grid container">
            <main>
              <div class="glass-card" style="padding: 0; margin-bottom: 2rem; overflow: hidden;">
                <!-- Tabs Header -->
                <div style="display: flex; border-bottom: 1px solid rgba(255,255,255,0.08);">
                  <button id="overviewTab" class="tab-btn active" style="flex: 1; padding: 1.5rem; background: transparent; border: none; color: white; font-weight: 700; cursor: pointer; border-bottom: 2px solid var(--color-primary);">Overview</button>
                  <button id="assetsTab" class="tab-btn" style="flex: 1; padding: 1.5rem; background: transparent; border: none; color: var(--text-dim); font-weight: 700; cursor: pointer;">Project Assets 🔒</button>
                </div>
                
                <div id="overviewContent" style="padding: 2.5rem;">
                  <h2 class="gradient-text" style="margin-bottom: 2rem; font-size: 2rem;">Project Overview</h2>
                  <p style="line-height: 1.8; color: var(--text-muted); font-size: 1.1rem; margin-bottom: 3rem;">
                    ${project.description}
                  </p>

                  <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 700;">Technologies & Tools</h3>
                  <div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                    ${(project.tech_stack || []).map(tech => `<span class="tag" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.6rem 1.2rem;">${tech}</span>`).join("")}
                  </div>
                </div>

                <div id="assetsContent" style="padding: 2.5rem; display: none;">
                  <div style="text-align: center; padding: 3rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🔒</div>
                    <h3 style="margin-bottom: 1rem;">Content Locked</h3>
                    <p style="color: var(--text-dim);">Enroll in this project to access technical briefs, starter code, and design assets.</p>
                  </div>
                </div>
              </div>
            </main>

            <aside>
              <div class="glass-card" style="padding: 2.5rem; position: sticky; top: 100px; border: 1px solid rgba(99, 102, 241, 0.2); background: rgba(11, 12, 21, 0.8);">
                <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 2rem; color: var(--text-main);">Choose Your Track</div>
                
                <div id="enrollOptions">
                  <!-- Solo Track -->
                  <div class="track-option active" id="soloTrack" style="padding: 1.5rem; border: 1px solid var(--color-primary); border-radius: 15px; margin-bottom: 1rem; cursor: pointer; background: rgba(99,102,241,0.05);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                      <span style="font-weight: 800;">🚀 Individual Solo</span>
                      <span style="font-weight: 900; color: var(--color-primary);">${project.price === 0 ? 'Free' : '₹' + project.price.toLocaleString()}</span>
                    </div>
                    <p style="font-size: 0.85rem; color: var(--text-dim);">Perfect for deep focused learning and individual portfolio building.</p>
                  </div>

                  <!-- Squad Track -->
                  <div class="track-option" id="squadTrack" style="padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; margin-bottom: 2rem; cursor: pointer;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                      <span style="font-weight: 800;">👥 Squad Leader</span>
                      <span style="font-weight: 900;">₹${((project.price || 0) * 1.5).toLocaleString()}</span>
                    </div>
                    <p style="font-size: 0.85rem; color: var(--text-dim);">Lead a team. Invite up to 4 friends to collaborate in the virtual lab.</p>
                  </div>

                  <div id="squadNameInput" style="display: none; margin-bottom: 1.5rem;">
                    <label style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;">Squad Name</label>
                    <input type="text" id="groupName" placeholder="Enter Squad Name" style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; margin-top: 0.5rem;">
                  </div>

                  <div id="availableSquadsContainer" style="display: none; margin-bottom: 1.5rem;">
                    <label style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 0.75rem;">Or Join an Open Squad</label>
                    <div id="availableSquadsList" style="display: flex; flex-direction: column; gap: 0.75rem; max-height: 200px; overflow-y: auto;">
                      <!-- Available squads will be populated here -->
                    </div>
                  </div>

                  <button class="btn btn-primary btn-block" style="padding: 1.2rem; font-size: 1.1rem; font-weight: 700;" id="enrollBtn" data-project-id="${projectId}" data-project-price="${project.price}" data-project-title="${project.title}">
                    🚀 Enroll Now
                  </button>
                  <p style="font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-top: 1rem;">✓ 6 Mentor Sessions Included<br>✓ Certificate upon completion</p>
                </div>
                
                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 1rem;">
                  <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="width: 40px; height: 40px; border-radius: 10px; background: rgba(99, 102, 241, 0.1); display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">📍</div>
                    <div>
                      <div style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;">Location</div>
                      <div style="font-weight: 600;">${project.centerId ? project.centerId.name : "Projexify Central"}</div>
                    </div>
                  </div>
                </div>
              </div>
            </aside>
          </div>
        `;
        
        // Setup interactive elements after rendering
        requestAnimationFrame(() => {
          // Tab Switching
          const overviewTab = document.getElementById('overviewTab');
          const assetsTab = document.getElementById('assetsTab');
          const overviewContent = document.getElementById('overviewContent');
          const assetsContent = document.getElementById('assetsContent');

          if (overviewTab && assetsTab) {
            overviewTab.onclick = () => {
              overviewTab.classList.add('active');
              overviewTab.style.borderBottom = '2px solid var(--color-primary)';
              overviewTab.style.color = 'white';
              assetsTab.classList.remove('active');
              assetsTab.style.borderBottom = 'none';
              assetsTab.style.color = 'var(--text-dim)';
              overviewContent.style.display = 'block';
              assetsContent.style.display = 'none';
            };
            
            assetsTab.onclick = () => {
              assetsTab.classList.add('active');
              assetsTab.style.borderBottom = '2px solid var(--color-primary)';
              assetsTab.style.color = 'white';
              overviewTab.classList.remove('active');
              overviewTab.style.borderBottom = 'none';
              overviewTab.style.color = 'var(--text-dim)';
              assetsContent.style.display = 'block';
              overviewContent.style.display = 'none';
            };
          }

          // Track Selection (Solo vs Squad)
          const soloTrack = document.getElementById('soloTrack');
          const squadTrack = document.getElementById('squadTrack');
          const squadNameInput = document.getElementById('squadNameInput');
          const availableSquadsContainer = document.getElementById('availableSquadsContainer');
          const availableSquadsList = document.getElementById('availableSquadsList');

          const fetchAndDisplayAvailableSquads = async () => {
            try {
              const token = localStorage.getItem('token');
              const response = await fetch(`/api/groups/available/${projectId}`, {
                headers: {
                  'Authorization': `Bearer ${token}`
                }
              });

              if (response.ok) {
                const data = await response.json();
                if (data.available && data.available.length > 0) {
                  availableSquadsList.innerHTML = data.available.map(squad => `
                    <div style="padding: 0.75rem; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 8px; cursor: pointer; hover-effect: true;" class="available-squad-item" data-group-id="${squad._id}" data-group-name="${squad.name}">
                      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem;">
                        <span style="font-weight: 600; font-size: 0.9rem;">${squad.name}</span>
                        <span style="font-size: 0.75rem; color: var(--text-dim);">${squad.students.length}/4 members</span>
                      </div>
                      <div style="font-size: 0.75rem; color: var(--text-dim);">Led by: ${squad.leaderId.firstName} ${squad.leaderId.lastName}</div>
                    </div>
                  `).join('');

                  // Add click handlers to squad items
                  availableSquadsList.querySelectorAll('.available-squad-item').forEach(item => {
                    item.onclick = () => {
                      // Clear squad name and select this squad
                      const groupNameInput = document.getElementById('groupName');
                      groupNameInput.value = item.dataset.groupName;
                      groupNameInput.dataset.selectedGroupId = item.dataset.groupId;
                      item.style.background = 'rgba(99,102,241,0.2)';
                      availableSquadsList.querySelectorAll('.available-squad-item').forEach(i => {
                        if (i !== item) i.style.background = 'rgba(99,102,241,0.08)';
                      });
                    };
                    item.style.transition = 'all 0.2s ease';
                  });

                  availableSquadsContainer.style.display = 'block';
                } else {
                  availableSquadsList.innerHTML = '<div style="font-size: 0.9rem; color: var(--text-dim); text-align: center; padding: 0.75rem;">No open squads available. Create your own!</div>';
                  availableSquadsContainer.style.display = 'block';
                }
              }
            } catch (error) {
              console.error('Error fetching available squads:', error);
              availableSquadsContainer.style.display = 'none';
            }
          };

          if (soloTrack && squadTrack) {
            soloTrack.onclick = () => {
              soloTrack.style.borderColor = 'var(--color-primary)';
              soloTrack.style.background = 'rgba(99,102,241,0.05)';
              soloTrack.classList.add('active');
              squadTrack.style.borderColor = 'rgba(255,255,255,0.1)';
              squadTrack.style.background = 'transparent';
              squadTrack.classList.remove('active');
              squadNameInput.style.display = 'none';
              availableSquadsContainer.style.display = 'none';
            };
            
            squadTrack.onclick = async () => {
              squadTrack.style.borderColor = 'var(--color-primary)';
              squadTrack.style.background = 'rgba(99,102,241,0.05)';
              squadTrack.classList.add('active');
              soloTrack.style.borderColor = 'rgba(255,255,255,0.1)';
              soloTrack.style.background = 'transparent';
              soloTrack.classList.remove('active');
              squadNameInput.style.display = 'block';
              await fetchAndDisplayAvailableSquads();
            };
          }

          // Enroll button handler
          const enrollBtn = document.getElementById('enrollBtn');
          if (enrollBtn) {
            enrollBtn.addEventListener('click', function(e) {
              e.preventDefault();
              const projectId = this.dataset.projectId;
              const projectPrice = parseFloat(this.dataset.projectPrice);
              const projectTitle = this.dataset.projectTitle;
              handleEnroll(projectId, projectPrice, projectTitle);
            });
          } else {
            console.warn('Enroll button not found in DOM');
          }

          // Check if user is already enrolled
          checkEnrollmentStatus(projectId);
        });
        
      } catch (error) {
        console.error('Error loading project:', error);
        container.innerHTML = '<div class="container" style="padding: 100px; text-align: center;"><h2>Error loading project</h2><p>' + error.message + '</p></div>';
      }
    });
  </script>
</body>
</html>
