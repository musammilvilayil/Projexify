<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management - Mentor Panel - Projexify</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .dashboard-wrapper {
      min-height: 100vh;
      padding-top: 80px;
      position: relative;
      z-index: 1;
    }

    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 4rem);
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: clamp(3rem, 6vw, 5rem);
      flex-wrap: wrap;
      gap: 2rem;
    }

    .welcome-box h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome-box p {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-muted);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: clamp(1.5rem, 3vw, 2.5rem);
      margin-bottom: clamp(3rem, 6vw, 5rem);
    }

    .stat-card {
      padding: 2.5rem 2rem;
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 160px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .stat-card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
    }

    .stat-value {
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      line-height: 1.4;
    }

    .student-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-2xl);
      padding: 2rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(12px);
      transition: var(--transition);
      animation: slideUp 0.5s ease forwards;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      cursor: pointer;
    }

    .student-card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
    }

    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #0B0C15;
      overflow: hidden;
    }

    .aurora-blob {
      position: absolute;
      width: 800px;
      height: 800px;
      filter: blur(100px);
      opacity: 0.4;
      border-radius: 50%;
      mix-blend-mode: screen;
      animation: move 25s infinite alternate;
    }

    .aurora-1 {
      background: radial-gradient(circle, #6366f1 0%, transparent 70%);
      top: -200px;
      left: -200px;
    }

    .aurora-2 {
      background: radial-gradient(circle, #10b981 0%, transparent 70%);
      bottom: -200px;
      right: -200px;
      animation-delay: -5s;
    }

    .aurora-3 {
      background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: move-center 30s infinite alternate;
    }

    @keyframes move {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { transform: translate(100px, 100px) rotate(90deg) scale(1.2); }
    }

    @keyframes move-center {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-40%, -60%) scale(1.3); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress-circle {
      width: 80px;
      height: 80px;
    }

    .progress-circle circle {
      transition: stroke-dashoffset 0.5s ease;
    }

    .status-badge {
      padding: 0.6rem 1.5rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-badge.active { background: rgba(99, 102, 241, 0.1); color: #6366f1; border: 1px solid rgba(99, 102, 241, 0.2); }
    .status-badge.completed { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }

    .search-filter-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-xl);
      padding: 2rem;
      backdrop-filter: blur(12px);
      margin-bottom: 2.5rem;
      animation: slideUp 0.5s ease forwards;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .search-input-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-input-wrapper input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      transition: var(--transition);
    }

    .search-input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
    }

    .search-input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .search-input-wrapper::before {
      content: '🔍';
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .filter-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.75rem 1.5rem;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition);
      font-size: 0.9rem;
    }

    .filter-btn:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }

    .breadcrumb-nav {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      animation: slideUp 0.5s ease forwards;
    }

    .breadcrumb-nav a {
      color: var(--primary);
      text-decoration: none;
      transition: var(--transition);
      cursor: pointer;
    }

    .breadcrumb-nav a:hover {
      color: #8b5cf6;
      text-decoration: underline;
    }

    .breadcrumb-nav span {
      color: rgba(255, 255, 255, 0.5);
    }

    .no-results {
      text-align: center;
      padding: 4rem 2rem;
      animation: slideUp 0.5s ease forwards;
    }

    @media (max-width: 768px) {
      .dashboard-container { padding: 1.5rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .student-card { padding: 1.5rem; }
      .search-filter-section { padding: 1.5rem; }
      .filter-buttons { flex-direction: column; }
      .filter-btn { width: 100%; }
      .breadcrumb-nav { font-size: 0.85rem; }
    }

    @media (max-width: 480px) {
      .dashboard-container { padding: 1rem; }
      .stats-grid { grid-template-columns: 1fr; }
      .student-card { flex-direction: column; }
      .welcome-box h1 { font-size: 2rem; }
      .search-input-wrapper input { padding: 0.875rem 0.875rem 0.875rem 2.5rem; font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="aurora-bg">
    <div class="aurora-blob aurora-1"></div>
    <div class="aurora-blob aurora-2"></div>
    <div class="aurora-blob aurora-3"></div>
  </div>

  <div class="dashboard-wrapper">
    <div class="dashboard-container">
      <div class="breadcrumb-nav" role="navigation" aria-label="breadcrumb">
        <a href="/pages/mentor/dashboard.html">Dashboard</a>
        <span>→</span>
        <span aria-current="page">Students</span>
      </div>

      <div class="dashboard-header">
        <div class="welcome-box">
          <h1 id="pageTitle">Student Command Center</h1>
          <p>Monitor, evaluate, and guide your students toward mastery</p>
        </div>
      </div>

      <div class="search-filter-section">
        <div class="search-input-wrapper">
          <input 
            type="text" 
            id="studentSearch" 
            placeholder="Search by name or email..." 
            aria-label="Search students"
            autocomplete="off"
          >
        </div>
        <div>
          <label style="display: block; margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Sort by:</label>
          <div class="filter-buttons">
            <button class="filter-btn active" data-sort="name" aria-pressed="true">Name</button>
            <button class="filter-btn" data-sort="progress" aria-pressed="false">Progress</button>
            <button class="filter-btn" data-sort="projects" aria-pressed="false">Active Projects</button>
          </div>
        </div>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-value" id="totalStudents">0</div>
          <div class="stat-label">Active Students</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="avgProgress">0%</div>
          <div class="stat-label">Average Progress</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="completedMilestones">0</div>
          <div class="stat-label">Completed Milestones</div>
        </div>
      </div>

      <div id="studentsContainer">
        <div class="no-results">
          <div style="font-size: 3rem; margin-bottom: 1rem;">⏳</div>
          <p style="color: var(--text-muted);">Loading student data...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/js/api-client.js"></script>
  <script src="/assets/js/ui-manager.js"></script>
  <script>
    let allStudents = [];

    document.addEventListener('DOMContentLoaded', () => {
      // Disable notifications on this page to reduce API calls
      new UIManager({ enableNotifications: false });
      initStudentManagement();
      setupSearchAndFilters();
    });

    function setupSearchAndFilters() {
      const searchInput = document.getElementById('studentSearch');
      const sortButtons = document.querySelectorAll('.filter-btn');

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        filterAndRenderStudents(query, getCurrentSort());
      });

      sortButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          sortButtons.forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-pressed', 'false');
          });
          btn.classList.add('active');
          btn.setAttribute('aria-pressed', 'true');
          const query = searchInput.value.toLowerCase();
          filterAndRenderStudents(query, btn.dataset.sort);
        });
      });
    }

    function getCurrentSort() {
      const activeBtn = document.querySelector('.filter-btn.active');
      return activeBtn?.dataset.sort || 'name';
    }

    function filterAndRenderStudents(query, sortBy) {
      let filtered = allStudents.filter(record => {
        const student = record.studentId;
        const name = `${student.firstName} ${student.lastName}`.toLowerCase();
        const email = student.email.toLowerCase();
        return name.includes(query) || email.includes(query);
      });

      filtered.sort((a, b) => {
        const getProgress = (r) => {
          if (r && r.projectId && r.milestones && Array.isArray(r.milestones)) {
            const total = r.milestones.length;
            const completed = r.milestones.filter(m => m && m.status === 'completed').length;
            return total > 0 ? (completed / total) * 100 : 0;
          }
          return 0;
        };

        if (sortBy === 'name') {
          return `${a.studentId.firstName} ${a.studentId.lastName}`.localeCompare(`${b.studentId.firstName} ${b.studentId.lastName}`);
        } else if (sortBy === 'progress') {
          return getProgress(b) - getProgress(a);
        } else if (sortBy === 'projects') {
          return b.projects.length - a.projects.length;
        }
        return 0;
      });

      renderStudents(filtered, query);
    }

    async function initStudentManagement() {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        window.location.href = '/login.html';
        return;
      }

      try {
        const students = await window.api.getMentorStudents();
        
        // Filter students to only show those with projects assigned to this mentor
        const filteredStudents = students.filter(record => {
          return record && record.projectId && record.assignedMentorId === user.id;
        });

        console.log('[Student Management] All students:', students);
        console.log('[Student Management] Filtered students:', filteredStudents);

        allStudents = filteredStudents;
        renderStudents(filteredStudents);
        calculateStats(filteredStudents);
      } catch (err) {
        document.getElementById('studentsContainer').innerHTML = `
          <div class="no-results" style="background: rgba(239, 68, 68, 0.05); border: 2px dashed rgba(239, 68, 68, 0.2); border-radius: 16px;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
            <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">Connection Failed</h3>
            <p style="color: var(--text-muted);">${err.message}</p>
          </div>
        `;
      }
    }

    function calculateStats(students) {
      if (!students || students.length === 0) {
        document.getElementById('totalStudents').textContent = 0;
        document.getElementById('avgProgress').textContent = '0%';
        document.getElementById('completedMilestones').textContent = 0;
        return;
      }

      document.getElementById('totalStudents').textContent = students.length;

      let totalProgress = 0;
      let totalMilestones = 0;
      let completedMilestones = 0;

      students.forEach(record => {
        if (!record || !record.projectId || !record.milestones) return;
        
        const completed = record.milestones.filter(m => m && m.status === 'completed').length;
        const total = record.milestones.length;
        if (total > 0) {
          totalProgress += (completed / total) * 100;
          totalMilestones += total;
          completedMilestones += completed;
        }
      });

      const avgProgress = students.length > 0 ? Math.round(totalProgress / students.length) : 0;
      document.getElementById('avgProgress').textContent = avgProgress + '%';
      document.getElementById('completedMilestones').textContent = completedMilestones;
    }

    function renderStudents(students) {
      const container = document.getElementById('studentsContainer');

      if (!students || students.length === 0) {
        container.innerHTML = `
          <div class="no-results" style="background: rgba(99, 102, 241, 0.03); border: 2px dashed rgba(99, 102, 241, 0.2); border-radius: 16px;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">👥</div>
            <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">No Students Assigned</h3>
            <p style="color: var(--text-muted);">You currently have no students in your mentorship group.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = students.map((record, idx) => {
        const student = record.studentId;
        const initials = (student.firstName?.[0] || 'S') + (student.lastName?.[0] || '');
        
        let totalMilestones = 0;
        let completedMilestones = 0;
        
        if (record && record.projectId && record.milestones && Array.isArray(record.milestones)) {
          totalMilestones = record.milestones.length;
          completedMilestones = record.milestones.filter(m => m && m.status === 'completed').length;
        }

        const progressPercentage = totalMilestones > 0 ? Math.round((completedMilestones / totalMilestones) * 100) : 0;
        const circumference = 2 * Math.PI * 30;
        const offset = circumference - (progressPercentage / 100) * circumference;

        return `
          <div class="student-card" onclick="viewStudent('${student._id}')" role="button" tabindex="0" onkeypress="if(event.key==='Enter') viewStudent('${student._id}')" style="animation-delay: ${idx * 0.1}s;" aria-label="View ${student.firstName} ${student.lastName}">
            <div style="display: flex; align-items: center; gap: 2rem; flex-wrap: wrap;">
              <div style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; color: white; box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);">
                ${initials}
              </div>
              <div style="flex: 1; min-width: 200px;">
                <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem;">${student.firstName} ${student.lastName}</h3>
                <p style="color: var(--text-muted); margin: 0;">${student.email}</p>
                <p style="color: var(--text-muted); margin: 0.25rem 0 0 0; font-size: 0.9rem;">1 Active Project</p>
              </div>
              <div style="display: flex; align-items: center; gap: 2rem;">
                <svg class="progress-circle" viewBox="0 0 80 80" role="img" aria-label="Progress: ${progressPercentage}%">
                  <circle cx="40" cy="40" r="30" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="8"/>
                  <circle cx="40" cy="40" r="30" fill="none" stroke="url(#gradient)" stroke-width="8" stroke-linecap="round" 
                    stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" 
                    transform="rotate(-90 40 40)" style="transition: stroke-dashoffset 0.5s ease;"/>
                  <text x="40" y="40" text-anchor="middle" dy="7" font-size="16" font-weight="700" fill="#6366f1">${progressPercentage}%</text>
                  <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
                    </linearGradient>
                  </defs>
                </svg>
                <div>
                  <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem;">Progress</div>
                  <div style="font-size: 1.2rem; font-weight: 700;">${completedMilestones}/${totalMilestones}</div>
                  <div style="font-size: 0.85rem; color: var(--text-muted);">Milestones</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function viewStudent(studentId) {
      window.location.href = `/pages/mentor/student-detail.html?studentId=${studentId}`;
    }
  </script>
</body>
</html>
