<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentor Management | Nexus</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/design-system.css">
  <style>
    .main-content {
      padding: clamp(2rem, 5vw, 4rem);
      max-width: 1600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .mentor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2.5rem;
      margin-top: 3rem;
    }

    .mentor-card {
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      background: var(--bg-glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(12px);
    }

    .mentor-card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    .mentor-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 2rem;
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      color: white;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
      border: 4px solid rgba(255, 255, 255, 0.1);
    }

    .mentor-name {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }

    .mentor-email {
      font-size: 1rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
      display: block;
    }

    .expertise-tag {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .search-container {
      margin-bottom: 3rem;
      max-width: 600px;
    }

    .search-input-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 1.2rem;
    }

    .search-input {
      width: 100%;
      padding: 1.2rem 1.5rem 1.2rem 3.5rem;
      background: var(--bg-glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      color: var(--text-main);
      font-size: 1.1rem;
      transition: var(--transition);
      backdrop-filter: blur(8px);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .center-nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 3rem;
      background: var(--bg-glass);
      padding: 0.5rem;
      border-radius: 1.5rem;
      border: 1px solid var(--glass-border);
      width: fit-content;
    }

    .center-nav-link {
      padding: 0.8rem 2rem;
      border-radius: 1rem;
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }

    .center-nav-link:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .center-nav-link.active {
      background: var(--gradient-primary);
      color: white;
    }

    /* Aurora Background Styles */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #0B0C15;
      overflow: hidden;
    }

    .aurora-blob {
      position: absolute;
      width: 800px;
      height: 800px;
      filter: blur(100px);
      opacity: 0.4;
      border-radius: 50%;
      mix-blend-mode: screen;
      animation: move 25s infinite alternate;
    }

    .aurora-1 {
      background: radial-gradient(circle, #6366f1 0%, transparent 70%);
      top: -200px;
      left: -200px;
    }

    .aurora-2 {
      background: radial-gradient(circle, #10b981 0%, transparent 70%);
      bottom: -200px;
      right: -200px;
      animation-delay: -5s;
    }

    .aurora-3 {
      background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: move-center 30s infinite alternate;
    }

    @keyframes move {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { transform: translate(100px, 100px) rotate(90deg) scale(1.2); }
    }

    @keyframes move-center {
      0% { transform: translate(-50%, -50%) scale(1); }
      100% { transform: translate(-40%, -60%) scale(1.3); }
    }

    /* Enhanced Card Styles */
    .mentor-card {
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    .mentor-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.05),
        transparent
      );
      transition: 0.5s;
    }

    .mentor-card:hover::after {
      left: 100%;
    }

    .mentor-card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
    }

    /* Button Shimmer Effect */
    .btn-primary {
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
      transform: rotate(45deg);
      transition: 0.6s;
      z-index: -1;
    }

    .btn-primary:hover::before {
      left: 120%;
    }
  </style>
</head>
<body>
  <!-- Aurora Background -->
  <div class="aurora-bg">
    <div class="aurora-blob aurora-1"></div>
    <div class="aurora-blob aurora-2"></div>
    <div class="aurora-blob aurora-3"></div>
  </div>

  <main class="main-content">
    <header class="dashboard-header">
      <div class="dashboard-header-content">
        <h1 class="gradient-text">Mentor Management</h1>
        <p>Manage and monitor your center's expert mentors and industry guides.</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="inviteMentorBtn" style="padding: 1rem 2rem; font-weight: 700;">+ Invite New Mentor</button>
      </div>
    </header>

    <nav class="center-nav">
      <a href="/pages/center/dashboard.html" class="center-nav-link">Dashboard</a>
      <a href="/pages/center/mentor-manager.html" class="center-nav-link active">Mentors</a>
      <a href="/pages/center/project-management.html" class="center-nav-link">Projects</a>
    </nav>

    <div class="search-container">
      <div class="search-input-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="mentorSearch" class="search-input" placeholder="Search mentors by name, email or expertise...">
      </div>
    </div>

    <div id="mentorGrid" class="mentor-grid">
      <!-- Mentors will be loaded here -->
    </div>
  </main>

  <!-- Invite Mentor Modal -->
  <div id="mentorModal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 500px; padding: 2.5rem; position: relative; margin: 2rem; max-height: 90vh; overflow-y: auto;">
      <button id="closeModalX" style="position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.5rem;">&times;</button>
      
      <h2 class="gradient-text" id="modalTitle" style="margin-bottom: 0.5rem;">Add New Mentor</h2>
      <p id="modalSubtitle" style="color: var(--text-muted); margin-bottom: 2rem;">Create a mentor account for your center.</p>

      <form id="mentorForm">
        <input type="hidden" id="mentorId">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">First Name</label>
            <input type="text" id="mentorFirstName" class="form-input" required style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 0.75rem; color: var(--text-main);">
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Last Name</label>
            <input type="text" id="mentorLastName" class="form-input" required style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 0.75rem; color: var(--text-main);">
          </div>
        </div>

        <div class="form-group" id="emailGroup" style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Email Address</label>
          <input type="email" id="mentorEmail" class="form-input" required style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 0.75rem; color: var(--text-main);">
        </div>

        <div class="form-group" id="passwordGroup" style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Temporary Password</label>
          <input type="password" id="mentorPassword" class="form-input" required style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 0.75rem; color: var(--text-main);">
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Expertise / Bio</label>
          <textarea id="mentorExpertise" class="form-input" rows="3" style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 0.75rem; color: var(--text-main); resize: none;"></textarea>
        </div>

        <div style="display: flex; gap: 1rem;">
          <button type="button" id="closeModalBtn" class="btn btn-glass" style="flex: 1;">Cancel</button>
          <button type="submit" id="submitBtn" class="btn btn-primary" style="flex: 1;">Create Account</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/api-client.js"></script>
  <script src="/assets/js/ui-manager.js"></script>
  <script>
    const mentorModal = document.getElementById('mentorModal');
    const mentorForm = document.getElementById('mentorForm');
    const inviteMentorBtn = document.getElementById('inviteMentorBtn');
    const closeModalX = document.getElementById('closeModalX');
    const closeModalBtn = document.getElementById('closeModalBtn');
    let currentMentors = [];

    async function loadMentors() {
      try {
        if (window.UIManager) UIManager.showNotification('Loading mentors...', 'info');
        
        let centerId = localStorage.getItem('centerId');
        if (!centerId) {
          // Try to fetch center if ID is missing
          try {
            const center = await window.api.getMyCenter();
            if (center && center._id) {
              centerId = center._id;
              localStorage.setItem('centerId', centerId);
            } else {
              console.error('No center found for this admin');
              window.location.href = '/pages/center/dashboard.html';
              return;
            }
          } catch (e) {
            console.error('Could not fetch center:', e);
            window.location.href = '/login.html';
            return;
          }
        }

        const response = await window.api.getMentors({ centerId });
        currentMentors = Array.isArray(response) ? response : (response.data || []);
        renderMentors(currentMentors);

        // Check for deep link
        const urlParams = new URLSearchParams(window.location.search);
        const mentorId = urlParams.get('id');
        if (mentorId) {
          const mentor = currentMentors.find(m => m._id === mentorId);
          if (mentor) openModal(mentor);
        }
      } catch (error) {
        console.error('Error loading mentors:', error);
        if (window.UIManager) UIManager.showNotification('Failed to load mentors', 'error');
      }
    }

    function renderMentors(mentors) {
      const grid = document.getElementById('mentorGrid');
      if (!mentors || mentors.length === 0) {
        grid.innerHTML = `
          <div class="glass-card" style="grid-column: 1/-1; padding: 4rem; text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.5;">👥</div>
            <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">No Mentors Found</h3>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Start by inviting mentors to your center to guide student projects.</p>
            <button class="btn btn-primary" id="emptyStateInviteBtn">Invite Your First Mentor</button>
          </div>
        `;
        
        const emptyBtn = document.getElementById('emptyStateInviteBtn');
        if (emptyBtn) {
          emptyBtn.addEventListener('click', () => inviteMentorBtn.click());
        }
        return;
      }

      grid.innerHTML = mentors.map(mentor => `
        <div class="glass-card mentor-card">
          <div class="mentor-avatar">${mentor.firstName ? mentor.firstName.charAt(0) : (mentor.name ? mentor.name.charAt(0) : 'M')}</div>
          <h3 class="mentor-name">${mentor.name || `${mentor.firstName} ${mentor.lastName}`}</h3>
          <span class="mentor-email">${mentor.email}</span>
          <div class="expertise-tag">${mentor.expertise || mentor.bio || 'General Mentor'}</div>
          <div style="display: flex; gap: 1rem; justify-content: center;">
            <button class="btn btn-secondary edit-mentor-btn" data-id="${mentor._id}" style="flex: 1; padding: 0.75rem;">Edit</button>
            <button class="btn btn-outline delete-mentor-btn" data-id="${mentor._id}" data-name="${mentor.name || `${mentor.firstName} ${mentor.lastName}`}" style="flex: 1; padding: 0.75rem; border-color: rgba(239, 68, 68, 0.3); color: #ef4444;">Delete</button>
          </div>
        </div>
      `).join('');

      // Add event listeners
      grid.querySelectorAll('.edit-mentor-btn').forEach(btn => {
        btn.addEventListener('click', () => editMentor(btn.dataset.id));
      });
      grid.querySelectorAll('.delete-mentor-btn').forEach(btn => {
        btn.addEventListener('click', () => deleteMentor(btn.dataset.id, btn.dataset.name));
      });
    }

    // Search functionality
    document.getElementById('mentorSearch').addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase();
      const filtered = currentMentors.filter(mentor => {
        const name = (mentor.name || `${mentor.firstName} ${mentor.lastName}`).toLowerCase();
        const expertise = (mentor.expertise || mentor.bio || '').toLowerCase();
        const email = mentor.email.toLowerCase();
        return name.includes(searchTerm) || expertise.includes(searchTerm) || email.includes(searchTerm);
      });
      renderMentors(filtered);
    });

    function openModal(mentor = null) {
      const title = document.getElementById('modalTitle');
      const subtitle = document.getElementById('modalSubtitle');
      const submitBtn = document.getElementById('submitBtn');
      const emailGroup = document.getElementById('emailGroup');
      const passwordGroup = document.getElementById('passwordGroup');

      if (mentor) {
        title.textContent = 'Edit Mentor';
        subtitle.textContent = 'Update mentor details for your center.';
        submitBtn.textContent = 'Update Mentor';
        document.getElementById('mentorId').value = mentor._id;
        document.getElementById('mentorFirstName').value = mentor.firstName || (mentor.name ? mentor.name.split(' ')[0] : '');
        document.getElementById('mentorLastName').value = mentor.lastName || (mentor.name ? mentor.name.split(' ').slice(1).join(' ') : '');
        document.getElementById('mentorExpertise').value = mentor.bio || mentor.expertise || '';
        
        emailGroup.style.display = 'none';
        passwordGroup.style.display = 'none';
        document.getElementById('mentorEmail').required = false;
        document.getElementById('mentorPassword').required = false;
      } else {
        title.textContent = 'Add New Mentor';
        subtitle.textContent = 'Create a mentor account for your center.';
        submitBtn.textContent = 'Create Account';
        mentorForm.reset();
        document.getElementById('mentorId').value = '';
        
        emailGroup.style.display = 'block';
        passwordGroup.style.display = 'block';
        document.getElementById('mentorEmail').required = true;
        document.getElementById('mentorPassword').required = true;
      }
      
      mentorModal.style.display = 'flex';
    }

    function closeModal() {
      mentorModal.style.display = 'none';
      mentorForm.reset();
    }

    inviteMentorBtn.addEventListener('click', () => openModal());
    closeModalX.addEventListener('click', closeModal);
    closeModalBtn.addEventListener('click', closeModal);

    function editMentor(mentorId) {
      const mentor = currentMentors.find(m => m._id === mentorId);
      if (mentor) {
        openModal(mentor);
      }
    }

    async function deleteMentor(mentorId, name) {
      if (!confirm(`Are you sure you want to remove ${name} from your center? This will delete their mentor account.`)) {
        return;
      }

      try {
        if (window.UIManager) UIManager.showNotification('Removing mentor...', 'info');
        await window.api.deleteMentor(mentorId);
        if (window.UIManager) UIManager.showNotification('Mentor removed successfully', 'success');
        loadMentors();
      } catch (error) {
        console.error('Delete error:', error);
        if (window.UIManager) UIManager.showNotification('Failed to remove mentor', 'error');
      }
    }

    mentorForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const mentorId = document.getElementById('mentorId').value;
      const centerId = localStorage.getItem('centerId');

      const mentorData = {
        firstName: document.getElementById('mentorFirstName').value,
        lastName: document.getElementById('mentorLastName').value,
        bio: document.getElementById('mentorExpertise').value,
        centerId: centerId
      };

      try {
        if (window.UIManager) UIManager.showNotification(mentorId ? 'Updating mentor...' : 'Creating mentor account...', 'info');

        if (mentorId) {
          await window.api.updateMentor(mentorId, mentorData);
          if (window.UIManager) UIManager.showNotification('Mentor updated successfully', 'success');
        } else {
          mentorData.email = document.getElementById('mentorEmail').value;
          mentorData.password = document.getElementById('mentorPassword').value;
          await window.api.createMentor(mentorData);
          if (window.UIManager) UIManager.showNotification('Mentor invited successfully', 'success');
        }
        closeModal();
        loadMentors();
      } catch (error) {
        console.error('Save error:', error);
        if (window.UIManager) UIManager.showNotification(error.message || 'Failed to save mentor', 'error');
      }
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user || !user.roles.includes('center_admin')) {
        window.location.href = '/login.html';
        return;
      }
      loadMentors();
    });
  </script>
</body>
</html>
